<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Loan Application Form</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            background-color: #f4f4f4;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            margin: 0;\n        }\n        .container {\n            background: #fff;\n            padding: 20px;\n            border-radius: 8px;\n            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);\n            width: 300px;\n        }\n        h2 {\n            text-align: center;\n            color: #333;\n        }\n        input[type="text"], input[type="email"], input[type="number"], select {\n            width: 100%;\n            padding: 10px;\n            margin: 10px 0;\n            border: 1px solid #ccc;\n            border-radius: 4px;\n        }\n        button {\n            width: 100%;\n            padding: 10px;\n            background-color: #28a745;\n            color: white;\n            border: none;\n            border-radius: 4px;\n            cursor: pointer;\n        }\n        button:hover {\n            background-color: #218838;\n        }\n        .payment-info {\n            margin-top: 20px;\n            text-align: center;\n        }\n    </style>\n</head>\n<body>\n    <div class="container">\n        <h2>Loan Application</h2>\n        <form onsubmit="return calculatePayment(event);">\n            <input type="text" id="name" placeholder="Name" required>\n            <input type="email" id="email" placeholder="Email" required>\n            <input type="text" id="phone" placeholder="Phone" required>\n            <input type="number" id="loanAmount" placeholder="Loan Amount" required>\n            <input type="number" id="loanDuration" placeholder="Loan Duration (months)" required>\n            <button type="submit">Calculate</button>\n        </form>\n        <div id="result" style="display:none;">\n            <h3>Loan Details</h3>\n            <p>Monthly Payment: <span id="monthlyPayment"></span></p>\n            <p>Total Interest: <span id="totalInterest"></span></p>\n            <div class="payment-info">\n                <p>M-Pesa Till Number: <strong>8334932</strong></p>\n                <p>Till Name: <strong>iveen</strong></p>\n            </div>\n        </div>\n    </div>\n    <script>\n        function calculatePayment(event) {\n            event.preventDefault();\n            const amount = parseFloat(document.getElementById('loanAmount').value);\n            const duration = parseInt(document.getElementById('loanDuration').value);\n            const interestRate = 0.05; // Example interest rate 5%\n            const totalInterest = amount * interestRate;\n            const monthlyPayment = (amount + totalInterest) / duration;\n            document.getElementById('monthlyPayment').innerText = monthlyPayment.toFixed(2);\n            document.getElementById('totalInterest').innerText = totalInterest.toFixed(2);\n            document.getElementById('result').style.display = 'block';\n        }\n    </script>\n</body>\n</html>
