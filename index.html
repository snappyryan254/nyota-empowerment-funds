<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyota Empowerment Funds</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Nyota Empowerment Funds</h1>
    </header>
    <main>
        <section>
            <h2>Make a Contribution</h2>
            <form action="https://mpesa.payments.example.com" method="POST">
                <label for="amount">Amount (KES):</label>
                <input type="number" id="amount" name="amount" required min="1">
                <br>
                <label for="till">Till Number:</label>
                <input type="text" id="till" name="till" value="8334932" readonly>
                <br>
                <input type="submit" value="Pay with M-Pesa">
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Nyota Empowerment Funds</p>
    </footer>
</body>
</html>
